name: Deploy Infrastructure

on:
  push:
    branches:
      - 4-setup-terraform-as-iac-with-cicd-workflows

jobs:
  terraform-apply-run:
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}
      CONFIG_DIRECTORY: infra/prod
    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: create-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}

      - uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        id: apply
        if: ${{ fromJSON(steps.create-run.outputs.payload).data.attributes.actions.IsConfirmable }}
        with:
          run: ${{ steps.create-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"

  configure-flux-and-nginx-fabric:
    runs-on: ubuntu-latest
    needs: terraform-apply-run
    environment: prod
    env:
      DO_ACCESS_TOKEN: ${{ secrets.DO_API_TOKEN }}
      CLUSTER_NAME: "personal-website-cluster-prod"
    steps:
      - uses: digitalocean/action-doctl@v2
        id: set-kubectl-config
        with:
          token: ${{ secrets.DO_ACCESS_TOKEN }}
          run: |
            set -euo pipefail

            echo "Fetching kubeconfig for $CLUSTER_NAME ..."
            for i in {1..10}; do
              if doctl kubernetes cluster kubeconfig save "$CLUSTER_NAME"; then
                break
              fi
              echo "Cluster not ready yet – sleeping 30 s"
              sleep 30
            done

            test -f "$HOME/.kube/config"

            echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Bootstrap Flux & Gateway Fabric
        env:
          FLUX_SSH_KEY: ${{ secrets.FLUX_SSH_KEY }}
        run: |
          set -euo pipefail

          if kubectl get ns flux-system >/dev/null 2>&1; then
            echo "Flux already present – skipping bootstrap."
            exit 0
          fi

          flux install

          echo "$FLUX_SSH_KEY" > deploy.key
          chmod 600 deploy.key
          flux create secret git flux-system \
            --url  ssh://git@github.com/${{ github.repository }}.git \
            --branch main \
            --private-key-file deploy.key

          kubectl kustomize "https://github.com/nginx/nginx-gateway-fabric/config/crd/gateway-api/standard?ref=v1.6.2" | kubectl apply -f -

          kubectl apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/crds.yaml

          kubectl apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v1.6.2/deploy/default/deploy.yaml
